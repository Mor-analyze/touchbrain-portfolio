<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — TouchBrain</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="login-wrap">
    <div class="login-card">
        <div style="text-align:center;margin-bottom:20px">
            <img src="{{ url_for('static', filename='images/logo.png') }}"
                 alt="TouchBrain Logo"
                 style="width:160px;margin-bottom:12px">
            <div class="gold-line" style="margin:0 auto 12px"></div>
            <p style="font-size:13px;color:#888">Treatment App — Staff Portal</p>
        </div>

        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        <form method="POST" action="{{ url_for('auth.login_page') }}">
            <div class="form-group" style="margin-bottom:14px">
                <label>Email</label>
                <input type="email" name="email"
                    placeholder="clinic@touchbrain.com" required>
            </div>
            <div class="form-group" style="margin-bottom:20px">
                <label>Password</label>
                <input type="password" name="password"
                    placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary"
                style="width:100%;padding:10px;font-size:14px">
                Sign in
            </button>
        </form>
    </div>
</div>
</body>
</html>
